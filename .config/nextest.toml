# Nextest configuration for RITK workspace.
# Reference: https://nexte.st/docs/configuration/

# ritk-snap links native GPU (wgpu) and DICOM transport dependencies whose
# per-process initialization is not safe under heavy parallel process execution
# on the Windows/miniforge/headless build: concurrent nextest test processes
# abort with 0xc0000005 (access violation) during native-library/process startup
# — verified environmental, NOT a logic defect (running `-j1` passes all tests,
# including `apply_pacs_retrieve_series_err` which performs no network I/O, and
# each test passes in isolation). Serialize ritk-snap so only one of its test
# processes runs at a time, eliminating the startup race.
[test-groups]
ritk-snap-native-serial = { max-threads = 1 }
ritk-codecs-openjpeg-serial = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'package(ritk-snap)'
test-group = 'ritk-snap-native-serial'

[[profile.ci.overrides]]
filter = 'package(ritk-snap)'
test-group = 'ritk-snap-native-serial'

# The OpenJPEG differential binary launches the c2rust OpenJPEG reference in
# each test process. Four concurrent instances received null allocations and
# aborted together on the GitHub runner. Bound their aggregate memory without
# changing test inputs, assertions, or timeout enforcement.
[[profile.default.overrides]]
filter = 'package(ritk-codecs) & binary(jpeg2000_interop)'
test-group = 'ritk-codecs-openjpeg-serial'

[[profile.ci.overrides]]
filter = 'package(ritk-codecs) & binary(jpeg2000_interop)'
test-group = 'ritk-codecs-openjpeg-serial'

[profile.default]
# Default per-test timeout: abort tests that hang unexpectedly.
slow-timeout = { period = "10s", terminate-after = 1 }

# Gradient-based registration integration tests (single-test binaries).
# NOTE: test() matches the test *function* name, not the binary name.
# Function names use inverted prefix: test_registration_bspline_3d (not
# test_bspline_registration_3d), so the filter uses the actual prefixes.
# Also covers RSGD lib-integration tests that compete for NdArray CPU time.
[[profile.default.overrides]]
filter = 'test(test_registration_bspline) | test(test_registration_affine) | test(test_registration_rigid) | test(test_registration_versor) | test(test_multires_registration) | test(translation_recovery_shifted_gaussian) | test(multires_convergence_runs_all_levels) | test(rigid_recovery_identity_validates_pipeline) | test(sparse_sampling_produces_comparable_result) | test(test_diffeomorphic_ssmmorph_integration) | test(chunked_sparse_path_matches_nonchunked) | test(chunked_cached_path_matches_non_chunked) | test(convergence_history_tracks_per_level) | test(test_verify_) | test(recovers_known_translation_cross_modal) | test(syn_) | test(bspline_registers_) | test(rigid_registers_) | test(versor_registers_) | test(affine_registers_) | test(multires_registers_)'
slow-timeout = { period = "600s", terminate-after = 5 }

# B-Spline CR and multiscale CR tests: 5–10 min under CPU contention.
[[profile.default.overrides]]
filter = 'test(bspline_cr) | test(multires_cr)'
slow-timeout = { period = "600s", terminate-after = 5 }

# SSMorph neural network forward-pass tests on CPU NdArray backend:
# heavy conv3d stacks; allow up to 30 min under CPU contention.
[[profile.default.overrides]]
filter = 'test(test_encoder_forward) | test(test_encoder_stage_forward) | test(test_decoder_forward) | test(test_decoder_stage) | test(test_ssmmorph_forward) | test(test_nondiffeomorphic_mode) | test(test_ssmmorph_forward_combined) | test(test_transmorph_forward) | test(test_vmamba_block_forward) | test(test_vmamba_stage) | test(test_affine_network_forward) | test(test_affine_transform_forward)'
slow-timeout = { period = "600s", terminate-after = 5 }

# DICOM full-scan tests over the 303-slice skull-CT fixture: I/O-heavy.
[[profile.default.overrides]]
filter = 'test(test_scan_skull_ct) | test(test_load_dicom_volume_shape)'
slow-timeout = { period = "60s", terminate-after = 1 }

[profile.ci]
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = 'test(test_registration_bspline) | test(test_registration_affine) | test(test_registration_rigid) | test(test_registration_versor) | test(test_multires_registration) | test(translation_recovery_shifted_gaussian) | test(multires_convergence_runs_all_levels) | test(rigid_recovery_identity_validates_pipeline) | test(sparse_sampling_produces_comparable_result) | test(test_diffeomorphic_ssmmorph_integration) | test(chunked_sparse_path_matches_nonchunked) | test(chunked_cached_path_matches_non_chunked) | test(convergence_history_tracks_per_level) | test(test_verify_) | test(recovers_known_translation_cross_modal) | test(syn_) | test(bspline_registers_) | test(rigid_registers_) | test(versor_registers_) | test(affine_registers_) | test(multires_registers_)'
slow-timeout = { period = "600s", terminate-after = 5 }

[[profile.ci.overrides]]
filter = 'test(bspline_cr) | test(multires_cr)'
slow-timeout = { period = "600s", terminate-after = 5 }

[[profile.ci.overrides]]
filter = 'test(test_encoder_forward) | test(test_encoder_stage_forward) | test(test_decoder_forward) | test(test_decoder_stage) | test(test_ssmmorph_forward) | test(test_nondiffeomorphic_mode) | test(test_ssmmorph_forward_combined) | test(test_transmorph_forward) | test(test_vmamba_block_forward) | test(test_vmamba_stage) | test(test_affine_network_forward) | test(test_affine_transform_forward)'
slow-timeout = { period = "600s", terminate-after = 5 }

[[profile.ci.overrides]]
filter = 'test(test_scan_skull_ct) | test(test_load_dicom_volume_shape)'
slow-timeout = { period = "600s", terminate-after = 5 }

# Otsu K=4 and K=5 tests (long-running in unoptimized debug build).
[[profile.default.overrides]]
filter = 'test(test_k5_) | test(test_k4_)'
slow-timeout = { period = "120s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = 'test(test_k5_) | test(test_k4_)'
slow-timeout = { period = "120s", terminate-after = 2 }

# Heavy interpolation dispatch tests on large grids (1024^3 and 4D 128^4)
[[profile.default.overrides]]
filter = 'test(dispatch_routes_1024_to_typed_path) | test(nearest_dispatch_routes_1024_to_typed_path) | test(dispatch_4d_routes_128) | test(type_narrowing_wrapper_4d_routes_through_sealed_trait)'
slow-timeout = { period = "120s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = 'test(dispatch_routes_1024_to_typed_path) | test(nearest_dispatch_routes_1024_to_typed_path) | test(dispatch_4d_routes_128) | test(type_narrowing_wrapper_4d_routes_through_sealed_trait)'
slow-timeout = { period = "120s", terminate-after = 2 }

# wgpu/GPU rendering and layout tests in ritk-snap.
[[profile.default.overrides]]
filter = 'package(ritk-snap) & (test(gpu_) | test(render::))'
slow-timeout = { period = "180s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = 'package(ritk-snap) & (test(gpu_) | test(render::))'
slow-timeout = { period = "180s", terminate-after = 2 }
