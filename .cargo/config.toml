[alias]
xtask = "run --package xtask --"

[env]
# Use LLVM/Clang as the C/C++ compiler for native build dependencies (charls-sys, openjpeg-sys).
# force = false: CI and developer environment variables take precedence.
# x86_64-pc-windows-msvc: clang-cl provides MSVC ABI compatibility.
CC_x86_64_pc_windows_msvc = { value = "clang-cl", force = false }
CXX_x86_64_pc_windows_msvc = { value = "clang-cl", force = false }
AR_x86_64_pc_windows_msvc = { value = "llvm-lib", force = false }
# Static-link GCC/libstdc++/libpthread when using MSYS2 clang-cl on the MSVC target.
# Without this, charls-sys and openjpeg-sys (compiled as C++ static archives) embed
# references to libstdc++-6.dll, libgcc_s_seh-1.dll, and libwinpthread-1.dll —
# MinGW runtime DLLs absent from clean Windows installs.
# -Xclang passes the flag through clang-cl's MSVC frontend to the underlying driver.
CXXFLAGS_x86_64_pc_windows_msvc = { value = "-static-libstdc++ -static-libgcc", force = false }
CC_x86_64_unknown_linux_gnu = { value = "clang", force = false }
CXX_x86_64_unknown_linux_gnu = { value = "clang++", force = false }
CC_aarch64_unknown_linux_gnu = { value = "clang", force = false }
CXX_aarch64_unknown_linux_gnu = { value = "clang++", force = false }
CC_x86_64_apple_darwin = { value = "clang", force = false }
CXX_x86_64_apple_darwin = { value = "clang++", force = false }
CC_aarch64_apple_darwin = { value = "clang", force = false }
CXX_aarch64_apple_darwin = { value = "clang++", force = false }

[target.x86_64-pc-windows-gnu]
# Use LLVM's lld linker instead of GNU ld for the MSYS2 UCRT64 GNU target.
#
# GNU ld (binutils) on MSYS2 exits silently with code 1/5 when linking C++ static
# archives (charls-sys) that contain SEH/DWARF unwind symbols (__gxx_personality_seh0,
# _Unwind_Resume, __cxa_throw, etc.) — it produces no diagnostic and aborts before
# writing the output file. lld (LLVM 22.1.3, GNU-compatible mode) handles these
# correctly. lld is available at /ucrt64/bin/ld.lld in the MSYS2 UCRT64 environment.
#
# -lstdc++: links the C++ standard library to resolve ABI symbols required by
# charls-sys (ISO 14495-1 JPEG-LS, compiled as a C++ static archive). These symbols
# include __cxa_allocate_exception, __cxa_throw, __cxa_free_exception,
# __gxx_personality_seh0, std::system_error, std::runtime_error, operator new/delete,
# vtable for __cxxabiv1::__si_class_type_info, etc.
#
# cargo:rustc-link-lib directives emitted from build scripts are recorded in .rlib
# metadata for the compiling crate but are NOT propagated to dependent binary link
# steps by Cargo (examples, integration test binaries, standalone binaries). Adding
# -lstdc++ here as a direct rustflags link-arg ensures every binary built for this
# target — including examples and test harnesses — links the C++ runtime regardless
# of which crate in the dependency tree requires it.
#
# Harmlessness: on binaries that contain no C++ code, --gc-sections eliminates all
# unreferenced libstdc++ symbols, so the addition carries no size or startup cost.
#
# libstdc++.a and libstdc++.dll.a are located in the Rust sysroot lib directory
# (D:\msys64\ucrt64\lib for MSYS2 UCRT64), which is already in lld's search path
# via the -L <sysroot>/lib flag that rustc passes to the linker driver.
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=-lstdc++",
]
