# Python wheel build and smoke-test matrix.
#
# Invariants:
#   - maturin build must succeed on all target Python versions.
#   - Python API parity and smoke tests must pass against the installed wheel.
#   - No test is skipped or marked xfail without documented justification.
#
# Developer note:
#   - `crates/ritk-python/tests/python_api_drift_report.py` prints a human-readable
#     drift summary for Rust registrations, `.pyi` stubs, smoke-test required lists,
#     and the top-level `ritk` package contract.
#   - Use it locally when parity tests fail to identify missing, extra, or duplicate
#     exports before updating bindings, stubs, or smoke coverage.
#
# Trigger: push/PR to main or any sprint/* branch.

name: Python CI

on:
  push:
    branches:
      - main
      - "sprint/*"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-smoke-test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            python-version: "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python test tooling
        run: pip install maturin[patchelf] pytest numpy

      - name: Build ritk wheel
        run: >-
          maturin build
          --release
          --manifest-path crates/ritk-python/Cargo.toml
          --out dist

      - name: Install built ritk wheel
        shell: bash
        run: |
          python -m pip uninstall -y ritk || true
          python -m pip install --force-reinstall --no-index --find-links dist ritk

      - name: Run Python parity and smoke tests
        run: >-
          pytest
          crates/ritk-python/tests/test_python_api_parity.py
          crates/ritk-python/tests/test_segmentation_bindings.py
          crates/ritk-python/tests/test_smoke.py
          -v
          --tb=short

      - name: Run Python API drift report (always -- diagnostic context)
        # Diagnostic-only: prints a human-readable drift summary for Rust
        # registrations, .pyi stubs, smoke-test required lists, and the
        # top-level ritk package contract.  Exits 1 on detected drift, so
        # continue-on-error is set; the parity test step above is the
        # authoritative CI gate.
        if: always()
        shell: bash
        continue-on-error: true
        run: python crates/ritk-python/tests/python_api_drift_report.py

      - name: Run Rust unit tests
        run: cargo test -p ritk-python --lib -- --test-threads=4
        timeout-minutes: 10
