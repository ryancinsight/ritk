# Legacy Migration Audit (ritk) — kwavers-Atlas-migration-push ceremony
#
# Formalizes the parallel-surface + burnSSOT for the ritk workspace
# by gating every push and PR through
# `cargo run -p xtask -- burn-migration-audit`. The xtask scans the
# ritk workspace for `BURN_TOKENS` ban list (burn::, burn_ndarray,
# Tensor<, TensorData, Shape::new, Autodiff, Conv3d, Param<, etc.)
# plus `STANDALONE_LEGACY_TOKENS` (approx::, num_traits::,
# rustfft::, ndarray::) and exits non-zero on any allowlist drift
# that `xtask/burn_surface.allowlist` does not pre-approve.
#
# Note: This workflow deliberately does NOT call
# `--refresh-burn-allowlist`. Refreshing the burn allowlist is
# intentional-only under human review; the in-flight burn -> coeus
# migration reserves `burn-migration-audit` as the authoritative
# gate (cf. ritk HEAD = 42b3d8e4 docs(ritk): accuracy follow-up
# on Moirai parallel-surface SSOT doc).

name: Legacy Migration Audit (ritk)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  audit-burn-migration:
    name: Audit burn migration (xtask burn-migration-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ritk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: ritk

      - name: Checkout provider dependencies
        uses: ./ritk/.github/actions/checkout-atlas-dependencies

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry, index, git, and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ritk/target/
          key: cargo-ubuntu-latest-stable-${{ hashFiles('ritk/Cargo.lock') }}
          restore-keys: |
            cargo-ubuntu-latest-stable-

      - name: Run xtask burn-migration-audit
        id: audit
        shell: bash
        run: |
          set -o pipefail
          cargo run -p xtask -- burn-migration-audit 2>&1 | tee audit_log.txt

      - name: Upload audit log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ritk-burn-migration-audit-log
          path: ritk/audit_log.txt
          if-no-files-found: warn
