name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        timeout-minutes: 10

  dependency-alignment:
    name: Workspace Dependency Alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Enforce workspace dependency inheritance
        run: cargo metadata --format-version 1 --no-deps > /tmp/metadata.json && python - <<'PY'
          import json
          import pathlib
          import sys

          root = pathlib.Path.cwd()
          metadata = json.loads(pathlib.Path("/tmp/metadata.json").read_text())
          workspace_root = pathlib.Path(metadata["workspace_root"])
          failures = []

          for package in metadata["packages"]:
              manifest_path = pathlib.Path(package["manifest_path"])
              if manifest_path.parent == workspace_root:
                  continue

              text = manifest_path.read_text()
              for dep in package["dependencies"]:
                  source = dep.get("source")
                  path = dep.get("path")
                  if path is not None:
                      continue
                  if source is None:
                      continue

                  name = dep["name"]
                  if f"{name} = {{ workspace = true" not in text and f"{name}={{ workspace = true" not in text:
                      failures.append(f"{manifest_path.relative_to(workspace_root)}: dependency '{name}' is not inherited from workspace")

          if failures:
              print("Workspace dependency alignment check failed:")
              for failure in failures:
                  print(f" - {failure}")
              sys.exit(1)

          print("Workspace dependency alignment check passed.")
          PY

  test:
    name: Test Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: dependency-alignment
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM and Clang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y clang lld

      - name: Install LLVM and Clang (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm && echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install LLVM and Clang (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ matrix.os }}-stable-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.os }}-stable-

      - name: Run tests with nextest
        run: cargo nextest run --workspace --lib --tests

  python-wheel:
    name: Python Wheel (smoke test)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: >-
          maturin build
          --release
          --manifest-path crates/ritk-python/Cargo.toml
          --out /tmp/ritk-wheel

      - name: Smoke test wheel
        run: |
          pip install pytest
          pip install --find-links /tmp/ritk-wheel ritk
          python -c "import ritk; print(ritk.__version__)"
          python -c "import numpy as np; import ritk; img = ritk.Image(np.zeros((5, 5, 5), dtype=np.float32)); phi = ritk.Image(np.ones((5, 5, 5), dtype=np.float32)); out = ritk.segmentation.shape_detection_segment(img, phi, curvature_weight=1.0, propagation_weight=1.0, advection_weight=1.0, edge_k=1.0, sigma=1.0, dt=0.05, max_iterations=1, tolerance=1e-3); arr = out.numpy(); assert arr.shape == (5, 5, 5); assert np.isfinite(arr).all()"
          pytest crates/ritk-python/tests -q
