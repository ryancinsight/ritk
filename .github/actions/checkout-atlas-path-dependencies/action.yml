name: Checkout Atlas path dependencies
description: Materialize RITK's pinned Atlas provider graph

inputs:
  manifest:
    description: Cargo manifest relative to the workflow workspace
    required: true
  destination:
    description: Provider parent directory relative to the workflow workspace
    required: true

runs:
  using: composite
  steps:
    - name: Materialize canonical Atlas provider graph
      uses: ryancinsight/atlas/.github/actions/checkout-path-dependencies@1393fd8838f3bcd548959a83daa8d9375e3b03d9
      with:
        manifest: ${{ inputs.manifest }}
        destination: ${{ inputs.destination }}
        atlas_ref: 1393fd8838f3bcd548959a83daa8d9375e3b03d9
