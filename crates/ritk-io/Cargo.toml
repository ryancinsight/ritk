[package]
name = "ritk-io"
version = "0.1.0"
edition = "2021"

[dependencies]
ritk-core = { path = "../ritk-core" }
dicom = "0.8.0"
nifti = "0.16.0"
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
burn = { version = "0.19", features = ["wgpu", "train", "autodiff"] }
nalgebra = { version = "0.33", features = ["serde-serialize"] }
rayon = "1.9"
ndarray = "0.15"

[dev-dependencies]
burn-ndarray = "0.19"
tempfile = "3.10"
