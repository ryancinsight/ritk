[package]
name = "ritk-io"
version = "0.1.0"
edition = "2021"

[dependencies]
ritk-core = { path = "../ritk-core" }
dicom = "*"
dicom-core = "*"
nifti = "*"
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
burn = { version = "*", features = ["wgpu", "train", "autodiff"] }
nalgebra = { version = "*", features = ["serde-serialize"] }
rayon = "1.9"
ndarray = "0.15"
image = "0.24"

[dev-dependencies]
burn-ndarray = "0.19"
tempfile = "3.10"

[[example]]
name = "dicom_to_nifti"
path = "examples/dicom_to_nifti.rs"

    
