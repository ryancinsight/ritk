[package]
name = "ritk-registration"
version = "0.1.0"
edition = "2021"

[dependencies]
ritk-core = { path = "../ritk-core" }
ritk-model = { path = "../ritk-model" }
burn = { version = "0.19", features = ["wgpu", "train", "autodiff"] }
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
ndarray = { version = "0.16", features = ["rayon"] }
nalgebra = "0.33"

[dev-dependencies]
burn-ndarray = "0.19"
nalgebra = { version = "0.33", features = ["serde-serialize"] }
ritk-io = { path = "../ritk-io" }
anyhow = "1.0"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
walkdir = "2.4"

[[example]]
name = "rigid_registration"
path = "examples/rigid_registration.rs"

[[example]]
name = "dl_registration"
path = "examples/dl_registration.rs"

[[example]]
name = "brain_ct_mri_registration"
path = "examples/brain_ct_mri_registration.rs"
