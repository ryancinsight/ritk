[package]
name = "ritk-registration"
version = "0.1.0"
edition = "2021"

[features]
default = ["direct-parzen"]
# Use direct (sparse-loop) histogram computation for NdArray backends.
# ~6× faster than the tensor-based path on CPU. Disable for GPU/autodiff
# backends where the tensor matmul path is preferred, or when the
# Parzen weight matrices must remain in the autodiff graph.
direct-parzen = []

[dependencies]
ritk-core = { path = "../ritk-core" }
ritk-model = { path = "../ritk-model" }
burn = { version = "0.19", default-features = false, features = ["wgpu", "autodiff"] }
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
ndarray = { version = "0.16", features = ["rayon"] }
nalgebra = "0.33"
rayon = { workspace = true }

[dev-dependencies]
burn-ndarray = "0.19"
nalgebra = { version = "0.33", features = ["serde-serialize"] }
ritk-io = { path = "../ritk-io" }
anyhow = "1.0"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
walkdir = "2.4"
image = { workspace = true }
criterion = { workspace = true }
rand = { workspace = true }

[[bench]]
name = "mi_histogram"
harness = false

[[bench]]
name = "registration_pipeline"
harness = false

[[bench]]
name = "parzen_direct"
harness = false

[[bench]]
name = "bspline_displacement"
harness = false

[[example]]
name = "rigid_registration"
path = "examples/rigid_registration.rs"

[[example]]
name = "dl_registration"
path = "examples/dl_registration.rs"

[[example]]
name = "brain_ct_mri_registration"
path = "examples/brain_ct_mri_registration.rs"

[[example]]
name = "rire_mri_ct_registration"
path = "examples/rire_mri_ct_registration/main.rs"
