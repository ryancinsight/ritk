[package]
name = "ritk-core"
version = "0.1.0"
edition = "2021"

[dependencies]
burn = { version = "0.19", features = ["wgpu", "train", "autodiff"] }
nalgebra = { version = "0.33", features = ["serde-serialize"] }
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
bytemuck = "1.0"
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
burn-ndarray = "0.19"
tempfile = "3.10"
proptest = "1.0"
