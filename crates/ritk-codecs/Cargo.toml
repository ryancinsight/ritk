[package]
name = "ritk-codecs"
version = "0.1.0"
edition = "2021"
description = "RITK-native codec implementations: JPEG, JPEG-LS, JPEG 2000, PackBits, RLE Lossless"

[dependencies]
anyhow = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
jpeg2k = { workspace = true }

[dev-dependencies]
image = { workspace = true }
openjp2 = { workspace = true, features = ["file-io"] }
proptest = { workspace = true }
