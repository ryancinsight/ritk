[package]
name = "ritk-python"
version = "0.1.0"
edition = "2021"

[lib]
name = "_ritk"
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py39"] }
numpy = "0.22"
ritk-core = { path = "../ritk-core" }
ritk-io = { path = "../ritk-io" }
ritk-registration = { path = "../ritk-registration" }
burn-ndarray = "0.19"
burn = { version = "0.19", features = ["ndarray"] }
anyhow = "1.0"
thiserror = "2.0"
nalgebra = { version = "0.33" }
