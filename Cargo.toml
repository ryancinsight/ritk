[workspace]
members = [
  "crates/ritk-core",
  "crates/ritk-io",
  "crates/ritk-model",
  "crates/ritk-registration",
  "crates/ritk-python",
  "crates/ritk-cli",
  "xtask",
]
resolver = "2"

[workspace.dependencies]
ritk-core = { path = "crates/ritk-core" }
ritk-io = { path = "crates/ritk-io" }
ritk-model = { path = "crates/ritk-model" }
ritk-registration = { path = "crates/ritk-registration" }

burn = { version = "0.19", features = ["wgpu", "autodiff"] }
burn-ndarray = "0.19" # For CPU testing
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py39"] }
numpy = "0.22"
dicom = "0.8.0"
nifti = "0.17.0"
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
bytemuck = "1.0"
nalgebra = { version = "0.33", features = ["serde-serialize"] }
serde = { version = "1.0", features = ["derive"] }
rayon = "1.9"
tempfile = "3.10" # For testing
consus-hdf5 = { git = "https://github.com/ryancinsight/consus", features = ["std"] }
consus-core = { git = "https://github.com/ryancinsight/consus", features = ["std"] }
consus-compression = { git = "https://github.com/ryancinsight/consus", features = ["std", "deflate"] }
consus-io = { git = "https://github.com/ryancinsight/consus", features = ["std"] }
